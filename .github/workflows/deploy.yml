name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [publish-event]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ✅ LANGKAH UTAMA: Mengubah hasil 'next build' biasa menjadi format Cloudflare Workers
      - name: Build Next.js using Cloudflare Compiler
        run: npx @cloudflare/next-on-pages

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4'
          # ✅ Arahkan Wrangler ke folder hasil compile otomatis di atas
          command: deploy .vercel/output/static